name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: set up rust
        uses: actions/checkout@v2

      - name: build
        run: make debug-build

      - name: lint
        run: make lint

      - name: test
        run: make test
